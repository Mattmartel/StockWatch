      --red: #dc2626;

      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;

      background: var(--bg-secondary);
      border: 1px solid var(--border-color);

    }
    .card-compact {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 0.875rem;
    }
    .stat-card {
      background: var(--bg-tertiary);
      border: 1px solid var(--border-color);
      border-radius: 8px;
      padding: 0.875rem;
    }
    .gain { color: var(--green); }
    .loss { color: var(--red); }
    .btn-primary {
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border: 1px solid var(--border-color);
      padding: 0.5rem 1rem;
      border-radius: 6px;
      font-size: 0.875rem;
      font-weight: 500;
      transition: all 0.2s;
      cursor: pointer;
    }
    .btn-primary:hover {
      background: var(--bg-secondary);

    .btn-primary.active {
      background: var(--text-primary);
      color: var(--bg-primary);
      border-color: var(--text-primary);
    }
    input, select {
      background: var(--bg-secondary);
      border: 1px solid var(--border-color);
      color: var(--text-primary);
      padding: 0.5rem 0.75rem;
      border-radius: 6px;

      letter-spacing: -0.025em;

    .metric-lg {
      font-size: 2rem;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.05em;
    }
    .metric-md {
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1;
    }
    .label {
      color: var(--text-secondary);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }
    .divider {
      border-top: 1px solid var(--border-color);
      margin: 1rem 0;
    }
  </style>
</head>

                <stop offset="0%" style="stop-color:#22c55e;stop-opacity:1"/>

  <script>
    // Configure Chart.js defaults for light theme
    Chart.defaults.color = '#525252';
    Chart.defaults.borderColor = '#d4d4d4';
    Chart.defaults.backgroundColor = 'rgba(115, 115, 115, 0.1)';
    Chart.defaults.font.family = '-apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif';
    Chart.defaults.plugins.legend.labels.color = '#0a0a0a';
    Chart.defaults.plugins.tooltip.backgroundColor = '#ffffff';
    Chart.defaults.plugins.tooltip.titleColor = '#0a0a0a';
    Chart.defaults.plugins.tooltip.bodyColor = '#0a0a0a';
    Chart.defaults.plugins.tooltip.borderColor = '#d4d4d4';
    Chart.defaults.plugins.tooltip.borderWidth = 1;
    Chart.defaults.scale.grid.color = '#e5e5e5';
    Chart.defaults.scale.grid.lineWidth = 1;
    Chart.defaults.scale.ticks.color = '#525252';

    let portfolioData = [];
    let soldHoldingsData = [];
    let SHEET_ID = localStorage.getItem('sheetId') || '';
    let API_KEY = localStorage.getItem('apiKey') || '';
    let SHEET_NAME = localStorage.getItem('sheetName') || 'Sheet1';
    let SOLD_SHEET_NAME = 'Sold Holdings';
    let charts = {};
    let stockCharts = {};
    let sortBy = 'gainValue';
    let gainLossPeriod = 'day';
    let fifFilter = 'all';
    let locationFilter = 'all';
    let priceSource = localStorage.getItem('priceSource') || 'sheets';
    let lastRefreshTime = 0;
    const REFRESH_COOLDOWN = 60000;
    let exchangeRates = { AUDNZD: 1.0, USDNZD: 1.0 };
    let activeView = 'dashboard';
    let tableMetric = 'dollar';
    let tableSortBy = 'day';
    let stockAlerts = JSON.parse(localStorage.getItem('stockAlerts') || '{}');
    let dismissedAlerts = JSON.parse(localStorage.getItem('dismissedAlerts') || '{}');
    let benchmarkData = { NZX50: {}, ASX200: {}, SP500: {} };

    function calculateVolatility(prices) {
      if (prices.length < 2) return 0;
      const returns = [];
      for (let i = 1; i < prices.length; i++) {
        if (prices[i-1] > 0 && prices[i] > 0) {
          returns.push((prices[i] - prices[i-1]) / prices[i-1]);
        }
      }
      if (returns.length < 2) return 0;
      const mean = returns.reduce((a, b) => a + b, 0) / returns.length;
      const variance = returns.reduce((sum, r) => sum + Math.pow(r - mean, 2), 0) / returns.length;
      return Math.sqrt(variance) * Math.sqrt(252) * 100; // Annualized volatility as %
    }

    function calculateReturn(startPrice, endPrice) {
      if (startPrice <= 0 || endPrice <= 0) return 0;
      return ((endPrice - startPrice) / startPrice) * 100;
    }

    function getStockPrices(stock, days) {
      const prices = [cleanPrice(stock['Current Price'])];
      for (let i = 1; i <= days; i++) {
        const p = cleanPrice(stock['Day-' + i]);
        if (p > 0) prices.unshift(p);
      }
      return prices;
    }

    function saveCachedData(data) {
      localStorage.setItem('portfolioCache', JSON.stringify({ data: data, timestamp: Date.now() }));
    }

    function getCachedData() {
      const cached = localStorage.getItem('portfolioCache');
      return cached ? JSON.parse(cached) : null;
    }

    function saveAlerts() {
      localStorage.setItem('stockAlerts', JSON.stringify(stockAlerts));
    }

    function saveDismissedAlerts() {
      localStorage.setItem('dismissedAlerts', JSON.stringify(dismissedAlerts));
    }

    function setPriceSource(source) {
      priceSource = source;
      localStorage.setItem('priceSource', source);
      document.getElementById('updatePricesBtn').style.display = source === 'yahoo' ? 'block' : 'none';
      render();
    }

    function normalizeTickerForYahoo(ticker) {
      if (!ticker) return '';
      let t = ticker.trim().toUpperCase();
      if (t.startsWith('NZE:')) return t.replace('NZE:', '') + '.NZ';
      if (t.startsWith('ASX:')) return t.replace('ASX:', '') + '.AX';
      return ticker;
    }

    async function fetchYahooData(ticker, range = '15d', historicalDays = 8) {
      // Build attempt list: each entry is [proxyPrefix, yahooUrl]
      // Try v8 then v7 endpoint, across multiple proxies
      const v8url = 'https://query1.finance.yahoo.com/v8/finance/chart/' + encodeURIComponent(ticker) + '?interval=1d&range=' + range;
      const v7url = 'https://query2.finance.yahoo.com/v7/finance/chart/' + encodeURIComponent(ticker) + '?interval=1d&range=' + range;
      const proxies = [
        'https://corsproxy.io/?',
        'https://api.allorigins.win/raw?url=',
        'https://thingproxy.freeboard.io/fetch/',
        'https://api.codetabs.com/v1/proxy?quest='
      ];
      // Flatten: try v8 on each proxy, then v7 on each proxy
      const attempts = [
        ...proxies.map(p => [p, v8url]),
        ...proxies.map(p => [p, v7url])
      ];
      for (const [proxyPrefix, yahooUrl] of attempts) {
        try {
          const response = await fetch(proxyPrefix + encodeURIComponent(yahooUrl));
          if (!response.ok) continue;
          const data = await response.json();
          const result = data.chart?.result?.[0];
          if (!result) continue;
          
          const currentPrice = result.meta?.regularMarketPrice || 0;
          const timestamps = result.timestamp || [];
          const closePrices = result.indicators?.quote?.[0]?.close || [];
          if (currentPrice === 0 || closePrices.length === 0) continue;
          
          const nzPriceMap = {};
          for (let i = 0; i < timestamps.length; i++) {
            if (closePrices[i] !== null && closePrices[i] > 0) {
              const date = new Date(timestamps[i] * 1000);
              const nzDateStr = date.toLocaleDateString('en-NZ', { 
                timeZone: 'Pacific/Auckland', year: 'numeric', month: '2-digit', day: '2-digit' 
              }).split('/').reverse().join('-');
              nzPriceMap[nzDateStr] = closePrices[i];
            }
          }
          
          const now = new Date();
          const nzToday = now.toLocaleDateString('en-NZ', { 
            timeZone: 'Pacific/Auckland', year: 'numeric', month: '2-digit', day: '2-digit' 
          }).split('/').reverse().join('-');
          
          const historicalPrices = [];
          const todayDate = new Date(nzToday + 'T00:00:00');
          const maxDays = historicalDays * 2; // Check twice as many days to account for weekends
          for (let daysAgo = 0; daysAgo < maxDays; daysAgo++) {
            const checkDate = new Date(todayDate);
            checkDate.setDate(checkDate.getDate() - daysAgo);
            const checkDateStr = checkDate.toISOString().split('T')[0];
            if (nzPriceMap[checkDateStr]) {
              historicalPrices.push(nzPriceMap[checkDateStr]);
              if (historicalPrices.length >= historicalDays) break;
            }
          }
          
          return { currentPrice: currentPrice, historical: historicalPrices };
        } catch (e) {
          continue;
        }
      }
      return null;
    }

    function getCurrencyForTicker(ticker) {
      if (ticker.startsWith('NZE:')) return 'NZD';
      if (ticker.startsWith('ASX:')) return 'AUD';
      return 'USD';
    }

    function convertToNZD(price, currency) {
      if (currency === 'NZD') return price;
      if (currency === 'AUD') return price * exchangeRates.AUDNZD;
      if (currency === 'USD') return price * exchangeRates.USDNZD;
      return price;
    }

    async function fetchExchangeRates() {
      try {
        const rateAUD = await fetch('https://api.exchangerate-api.com/v4/latest/AUD');
        const dataAUD = await rateAUD.json();
        exchangeRates.AUDNZD = dataAUD.rates.NZD || 1.0;
        const rateUSD = await fetch('https://api.exchangerate-api.com/v4/latest/USD');
        const dataUSD = await rateUSD.json();
        exchangeRates.USDNZD = dataUSD.rates.NZD || 1.0;
      } catch (e) {
        exchangeRates = { AUDNZD: 1.08, USDNZD: 1.72 };
      }
    }

    async function fetchBenchmarkData() {
      // Read benchmark returns directly from the "Benchmarks" tab in Google Sheets.
      // That tab uses GOOGLEFINANCE() formulas which are accurate and need no CORS proxy.
      // Expected layout: row 1 = headers (Benchmark | 1D% | 7D% | 70D%)
      //                  rows 2-4 = NZX50, ASX200, S&P500
      try {
        const resp = await fetch(
          'https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID +
          '/values/Benchmarks?key=' + API_KEY
        );
        const json = await resp.json();
        if (!json.values || json.values.length < 2) return;
        const rows = json.values.slice(1); // skip header row
        const nameMap = { 'NZX50': 'NZX50', 'ASX200': 'ASX200', 'S&P500': 'SP500', 'SP500': 'SP500' };
        rows.forEach(row => {
          const key = nameMap[String(row[0] || '').trim().toUpperCase()] ||
                      nameMap[String(row[0] || '').trim()];
          if (!key) return;
          const parse = v => { const n = parseFloat(String(v).replace('%','')); return isNaN(n) ? null : n; };
          benchmarkData[key] = {
            '1d':  parse(row[1]),
            '7d':  parse(row[2]),
            '70d': parse(row[3])
          };
        });
      } catch (e) {
        console.log('Could not load Benchmarks sheet:', e);
      }
    }

    async function updatePricesFromYahoo() {
      const btn = document.getElementById('updatePricesBtn');
      btn.disabled = true;
      btn.textContent = 'Fetching rates...';
      await fetchExchangeRates();
      btn.textContent = 'Updating prices...';
      let ok = 0, fail = 0;
      
      for (let i = 0; i < portfolioData.length; i++) {
        const stock = portfolioData[i];
        const ticker = stock['Ticker/Symbol'] || '';
        if (!ticker) continue;
        
        try {
          const normalizedTicker = normalizeTickerForYahoo(ticker);
          const curr = getCurrencyForTicker(ticker);
          const data = await fetchYahooData(normalizedTicker);
          
          if (data && data.currentPrice > 0) {
            stock['Current Price'] = convertToNZD(data.currentPrice, curr);
            if (data.historical && data.historical.length > 1) {
              for (let j = 1; j < Math.min(data.historical.length, 8); j++) {
                stock['Day-' + j] = convertToNZD(data.historical[j], curr);
              }
            }
            ok++;
          } else {
            fail++;
          }
        } catch (e) {
          fail++;
        }
        
        btn.textContent = 'Updating... (' + (ok + fail) + '/' + portfolioData.length + ')';
        await new Promise(r => setTimeout(r, 200));
      }
      
      if (ok > 0) saveCachedData(portfolioData);
      btn.disabled = false;
      btn.textContent = 'Update Prices';
      alert('Updated ' + ok + ' stocks successfully');
      render();
    }

    document.getElementById('priceSourceSelect').onchange = (e) => setPriceSource(e.target.value);
    document.getElementById('updatePricesBtn').onclick = updatePricesFromYahoo;

    document.getElementById('settingsBtn').onclick = () => {
      document.getElementById('sheetsUrl').value = SHEET_ID ? 'https://docs.google.com/spreadsheets/d/' + SHEET_ID : '';
      document.getElementById('apiKey').value = API_KEY;
      document.getElementById('sheetName').value = SHEET_NAME;
      document.getElementById('settingsModal').classList.remove('hidden');
    };

    document.getElementById('cancelBtn').onclick = () => {
      document.getElementById('settingsModal').classList.add('hidden');
    };

    document.getElementById('saveBtn').onclick = () => {
      const url = document.getElementById('sheetsUrl').value;
      const match = url.match(/\/spreadsheets\/d\/([a-zA-Z0-9-_]+)/);
      if (!match) {
        alert('Invalid URL');
        return;
      }
      SHEET_ID = match[1];
      API_KEY = document.getElementById('apiKey').value;
      SHEET_NAME = document.getElementById('sheetName').value;
      localStorage.setItem('sheetId', SHEET_ID);
      localStorage.setItem('apiKey', API_KEY);
      localStorage.setItem('sheetName', SHEET_NAME);
      document.getElementById('settingsModal').classList.add('hidden');
      loadData(true);
    };

    function setSortBy(sort) { sortBy = sort; render(); }
    function setGainLossPeriod(period) { 
      gainLossPeriod = period; 
      updateGainLossSections();
    }
    function setFifFilter(filter) { fifFilter = filter; render(); }
    function setLocationFilter(filter) { locationFilter = filter; render(); }

    function updateGainLossSections() {
      const withGains = portfolioData.map(s => ({ 
        stock: s, 
        gainPct: getStockGainPct(s, gainLossPeriod), 
        gainDollar: getStockGainDollar(s, gainLossPeriod) 
      }));
      const topGDollar = [...withGains].filter(i => i.gainDollar > 0).sort((a, b) => b.gainDollar - a.gainDollar).slice(0, 3);
      const topLDollar = [...withGains].filter(i => i.gainDollar < 0).sort((a, b) => a.gainDollar - b.gainDollar).slice(0, 3);
      const topGPercent = [...withGains].filter(i => i.gainPct > 0).sort((a, b) => b.gainPct - a.gainPct).slice(0, 3);
      const topLPercent = [...withGains].filter(i => i.gainPct < 0).sort((a, b) => a.gainPct - b.gainPct).slice(0, 3);

      // Update Top Gainers $ Amount
      let html = '<h3 class="font-bold mb-3 text-green-700">Top Gainers ($ Amount)</h3><div class="flex gap-1 mb-3 flex-wrap">';
      ['day', '7days', '10weeks', 'purchase'].forEach(p => {
        const label = p === 'day' ? '1 Day' : p === '7days' ? '7 Days' : p === '10weeks' ? '10 Weeks' : 'Since Purchase';
        html += '<button onclick="setGainLossPeriod(\'' + p + '\')" class="text-xs px-2 py-1 rounded ' + (gainLossPeriod === p ? 'bg-blue-600 text-white' : 'bg-gray-200') + '">' + label + '</button>';
      });
      html += '</div>';
      topGDollar.forEach(i => {
        html += '<div class="mb-2 pb-2 border-b last:border-0"><div class="flex justify-between items-center"><div><p class="font-medium">' + (i.stock['Firm name'] || 'Unknown') + '</p><p class="text-xs text-gray-600">' + (i.stock['Ticker/Symbol'] || '') + '</p></div><p class="font-bold text-green-700">+$' + fmt(i.gainDollar) + ' <span class="text-sm">(+' + i.gainPct.toFixed(1) + '%)</span></p></div></div>';
      });
      const gainerDollar = document.getElementById('topGainersDollar');
      if (gainerDollar) gainerDollar.innerHTML = html;

      // Update Top Losers $ Amount
      html = '<h3 class="font-bold mb-3 text-red-700">Top Losers ($ Amount)</h3><div class="flex gap-1 mb-3 flex-wrap">';
      ['day', '7days', '10weeks', 'purchase'].forEach(p => {
        const label = p === 'day' ? '1 Day' : p === '7days' ? '7 Days' : p === '10weeks' ? '10 Weeks' : 'Since Purchase';
        html += '<button onclick="setGainLossPeriod(\'' + p + '\')" class="text-xs px-2 py-1 rounded ' + (gainLossPeriod === p ? 'bg-blue-600 text-white' : 'bg-gray-200') + '">' + label + '</button>';
      });
      html += '</div>';
      topLDollar.forEach(i => {
        html += '<div class="mb-2 pb-2 border-b last:border-0"><div class="flex justify-between items-center"><div><p class="font-medium">' + (i.stock['Firm name'] || 'Unknown') + '</p><p class="text-xs text-gray-600">' + (i.stock['Ticker/Symbol'] || '') + '</p></div><p class="font-bold text-red-700">-$' + fmt(Math.abs(i.gainDollar)) + ' <span class="text-sm">(' + i.gainPct.toFixed(1) + '%)</span></p></div></div>';
      });
      const loserDollar = document.getElementById('topLosersDollar');
      if (loserDollar) loserDollar.innerHTML = html;

      // Update Top Gainers % Change
      html = '<h3 class="font-bold mb-3 text-green-700">Top Gainers (% Change)</h3><div class="flex gap-1 mb-3 flex-wrap">';
      ['day', '7days', '10weeks', 'purchase'].forEach(p => {
        const label = p === 'day' ? '1 Day' : p === '7days' ? '7 Days' : p === '10weeks' ? '10 Weeks' : 'Since Purchase';
        html += '<button onclick="setGainLossPeriod(\'' + p + '\')" class="text-xs px-2 py-1 rounded ' + (gainLossPeriod === p ? 'bg-blue-600 text-white' : 'bg-gray-200') + '">' + label + '</button>';
      });
      html += '</div>';

    async function loadData(forceFresh) {
      try {
        if (!forceFresh) {
          const now = Date.now();
          if (now - lastRefreshTime < REFRESH_COOLDOWN) {
            const remaining = Math.ceil((REFRESH_COOLDOWN - (now - lastRefreshTime)) / 1000);
            alert('Please wait ' + remaining + ' seconds before refreshing again');
            return;
          }
        }
        
        lastRefreshTime = Date.now();
        
        const response = await fetch('https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values/' + SHEET_NAME + '?key=' + API_KEY);
        const json = await response.json();
        
        if (json.values && json.values.length > 1) {
          const headers = json.values[0];
          portfolioData = json.values.slice(1).map(row => {
            const obj = {};
            headers.forEach((h, i) => { obj[h] = row[i] || ''; });
            return obj;
          }).filter(s => !isWatchlisted(s));
          
          // Fetch sold holdings
          try {
            const soldResponse = await fetch('https://sheets.googleapis.com/v4/spreadsheets/' + SHEET_ID + '/values/' + SOLD_SHEET_NAME + '?key=' + API_KEY);
            const soldJson = await soldResponse.json();
            if (soldJson.values && soldJson.values.length > 1) {
              const soldHeaders = soldJson.values[0];
              soldHoldingsData = soldJson.values.slice(1).map(row => {
                const obj = {};
                soldHeaders.forEach((h, i) => { obj[h] = row[i] || ''; });
                return obj;
              }).filter(s => s['Firm name']); // Only include rows with a firm name
            }
          } catch (e) {
            console.log('Could not load sold holdings (optional):', e);
            soldHoldingsData = [];
          }
          
          saveCachedData(portfolioData);
          await fetchBenchmarkData();
          render();
        } else {
          document.getElementById('content').innerHTML = '<p class="text-red-600">No data found</p>';
        }
      } catch (error) {
        if (portfolioData.length === 0) {
          const cached = getCachedData();
          if (cached && cached.data.length > 0) {
            portfolioData = cached.data.filter(s => !isWatchlisted(s));
            render();
            document.getElementById('content').innerHTML += '<div class="bg-yellow-50 border border-yellow-200 rounded-lg p-3 text-sm mt-4"><p class="text-yellow-800">Using cached data. Could not refresh: ' + error.message + '</p></div>';
          } else {
            document.getElementById('content').innerHTML = '<p class="text-red-600">Error: ' + error.message + '</p>';
          }
        } else {
          document.getElementById('content').innerHTML = '<p class="text-red-600">Error: ' + error.message + '</p>';
        }
      }
    }

    function cleanPrice(p) {
      if (!p) return 0;
      const str = String(p).trim();
      if (str === '#N/A' || str === '#NA' || str === 'N/A' || str === '') return 0;
      const n = parseFloat(str.replace(/[$,]/g, ''));
      return isNaN(n) ? 0 : n;
    }

    function cleanNumber(n) {
      if (!n) return 0;
      const num = parseFloat(String(n).replace(/[,]/g, ''));
      return isNaN(num) ? 0 : num;
    }

    // Format a number with commas and optional decimal places (NZ locale)
    function fmt(n, d = 0) {
      if (typeof n !== 'number' || isNaN(n)) return '0';
      return n.toLocaleString('en-NZ', { minimumFractionDigits: d, maximumFractionDigits: d });
    }

    // Detect ETFs / index funds — exempt from single-stock concentration warnings
    function isETF(stock) {
      const name = (stock['Firm name'] || '').toLowerCase();
      const ticker = (stock['Ticker/Symbol'] || '').toLowerCase();
      return name.includes('etf') || name.includes(' fund') || name.includes('index fund') ||
             name.includes('vanguard') || name.includes('ishares') || name.includes('smartshares') ||
             ticker.includes('etf');
    }

    // Robust field lookup — tries multiple column name variants in order
    function getField(obj, ...candidates) {
      for (const key of candidates) {
        const val = obj[key];
        if (val !== undefined && val !== null && String(val).trim() !== '') return val;
      }
      return '';
    }

    // Returns calendar days since purchase date, or null if no date available.
    // Accepts DD/MM/YYYY (NZ) and ISO YYYY-MM-DD formats.
    function getPurchaseDaysAgo(stock) {
      const dateStr = stock['Purchase Date'] || '';
      if (!dateStr) return null;
      let d = null;
      const nzMatch = dateStr.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
      if (nzMatch) {
        d = new Date(parseInt(nzMatch[3]), parseInt(nzMatch[2]) - 1, parseInt(nzMatch[1]));
      } else {
        d = new Date(dateStr);
      }
      if (!d || isNaN(d.getTime())) return null;
      const today = new Date();
      today.setHours(0, 0, 0, 0);
      d.setHours(0, 0, 0, 0);
      return Math.max(0, Math.floor((today - d) / (1000 * 60 * 60 * 24)));
    }

    function isWatchlisted(stock) {
      const w = stock.Watchlist || '';
      return w.toString().toLowerCase() === 'yes' || w.toString().toLowerCase() === 'true' || w.toString() === '1' || w.toString().toLowerCase() === 'x';
    }

    function getStockValue(stock) {
      const tv = cleanPrice(stock['Total current value']);
      if (tv > 0) return tv;
      return (parseFloat(stock.Quantity) || 0) * cleanPrice(stock['Current Price']);
    }

    function getStockCost(stock) {
      const tc = cleanPrice(stock['Total purchase price']);
      if (tc > 0) return tc;
      return (parseFloat(stock.Quantity) || 0) * cleanPrice(stock['Purchase Price']);
    }

    function getStockGain(stock) {
      return getStockValue(stock) - getStockCost(stock);
    }

    function getStockGainPct(stock, period) {
      period = period || 'purchase';
      const curr = cleanPrice(stock['Current Price']);
      let base;
      if (period === 'day') base = cleanPrice(stock['Day-1']);
      else if (period === '7days') base = cleanPrice(stock['Day-7']);
      else if (period === '10weeks') base = cleanPrice(stock['Day-70']);
      else base = cleanPrice(stock['Purchase Price']);
      if (!base || base === 0) return 0;
      return ((curr - base) / base) * 100;
    }

    function getStockGainDollar(stock, period) {
      period = period || 'purchase';
      const qty = parseFloat(stock.Quantity) || 0;
      const curr = cleanPrice(stock['Current Price']);
      let base;
      if (period === 'day') base = cleanPrice(stock['Day-1']);
      else if (period === '7days') base = cleanPrice(stock['Day-7']);
      else if (period === '10weeks') base = cleanPrice(stock['Day-70']);
      else base = cleanPrice(stock['Purchase Price']);
      if (!base || base === 0) return 0;
      return qty * (curr - base);
    }

    function sortStocks(stocks) {
      return [...stocks].sort((a, b) => {
        if (sortBy === 'value') return getStockValue(b) - getStockValue(a);
        if (sortBy === 'gainPct') return getStockGainPct(b) - getStockGainPct(a);
        if (sortBy === 'lossPct') return getStockGainPct(a) - getStockGainPct(b);
        if (sortBy === 'gainValue') return getStockGain(b) - getStockGain(a);
        if (sortBy === 'lossValue') return getStockGain(a) - getStockGain(b);
        if (sortBy === 'dayChange') {
          const aChg = (parseFloat(a.Quantity) || 0) * (cleanPrice(a['Current Price']) - cleanPrice(a['Day-1']));
          const bChg = (parseFloat(b.Quantity) || 0) * (cleanPrice(b['Current Price']) - cleanPrice(b['Day-1']));
          return bChg - aChg;
        }
        if (sortBy === 'name') return (a['Firm name'] || '').localeCompare(b['Firm name'] || '');
        return 0;
      });
    }

    function createValueTrendChart() {
      const canvas = document.getElementById('valueTrendChart');
      if (!canvas) return;

      // Plot unrealised P&L = Σ qty × (price_at_day_i − purchase_price)
      // Stocks not yet owned at day i (no price data) are excluded, so new buys
      // don't cause sudden jumps in the chart.
      const days = [], values = [];
      for (let i = 70; i >= 0; i--) {
        let gainSum = 0, has = false;
        portfolioData.forEach(stock => {
          const qty = parseFloat(stock.Quantity) || 0;
          const purchasePrice = cleanPrice(stock['Purchase Price']);
          if (qty > 0 && purchasePrice > 0) {
            const price = i === 0 ? cleanPrice(stock['Current Price']) : cleanPrice(stock['Day-' + i]);
            if (price > 0) { gainSum += qty * (price - purchasePrice); has = true; }
          }
        });
        if (has) {
          days.push(i === 0 ? 'Today' : i + 'd');
          values.push(gainSum);
        }
      }

      // Smooth out anomalous drops (multi-day drops >40% that recover are likely API errors)
      // Look for valleys where value drops significantly but recovers within 1-3 days
      for (let i = 1; i < values.length; i++) {
        const prevValue = values[i - 1];
        const currValue = values[i];
        
        // Check if current value is way below previous
        const dropFromPrev = ((prevValue - currValue) / prevValue) * 100;
        
        if (dropFromPrev > 40) {
          // Look ahead up to 3 days to find recovery
          let recoveryIdx = -1;
          for (let j = i + 1; j < values.length; j++) {
            const futureValue = values[j];
            const diffFromPrev = Math.abs((futureValue - prevValue) / prevValue) * 100;
            // If future value is within 20% of pre-drop value, we found recovery
            if (diffFromPrev < 20) {
              recoveryIdx = j;
              break;
            }
          }
          
          // If we found a recovery, interpolate the dropped values
          if (recoveryIdx > 0) {
            const recoveryValue = values[recoveryIdx];
            const span = recoveryIdx - i + 1;
            // Linear interpolation between prevValue and recoveryValue
            for (let k = i; k < recoveryIdx; k++) {
              const progress = (k - i + 1) / (span + 1);
              values[k] = prevValue + (recoveryValue - prevValue) * progress;
            }
            i = recoveryIdx; // Skip ahead past the corrected section
          } else {
            // No recovery found, just use previous value
            values[i] = prevValue;
          }
        }
      }

      const firstValue = values[0];
      charts.valueTrend = new Chart(canvas, {
        type: 'line',
        data: {
          labels: days,
          datasets: [{
            label: 'Unrealised P&L',
            data: values,
            borderColor: 'rgb(59,130,246)',
            backgroundColor: 'rgba(59,130,246,0.1)',
            borderWidth: 2,
            fill: true,
            tension: 0.3,
            pointRadius: 1,
            pointHoverRadius: 5
          }]
        },
        options: {
          responsive: true,
          maintainAspectRatio: true,
          aspectRatio: 3,
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: c => {
                  const pnl = c.parsed.y;
                  const change = pnl - firstValue;
                  return [
                    'P&L: ' + (pnl >= 0 ? '+' : '') + '$' + fmt(pnl),
                    'vs 70d ago: ' + (change >= 0 ? '+' : '') + '$' + fmt(change)
                  ];
                }
              }
            }
          },
          scales: {
            y: { 
              beginAtZero: false,
              ticks: { callback: v => '$' + fmt(v) }
            },
            x: { 
              ticks: { 
                maxRotation: 0, 
                minRotation: 0,
                maxTicksLimit: 15
              }
            }
          }
        }
      });
    }

    function createPortfolioCharts() {
      const dpCanvas = document.getElementById('dailyPerformanceChart');
      if (dpCanvas) {
        // Use unrealised P&L so buying new shares doesn't show as a large positive bar
        const days = [], values = [];
        for (let i = 70; i >= 0; i--) {
          let gainSum = 0, has = false;
          portfolioData.forEach(stock => {
            const qty = parseFloat(stock.Quantity) || 0;
            const purchasePrice = cleanPrice(stock['Purchase Price']);
            if (qty > 0 && purchasePrice > 0) {
              const price = i === 0 ? cleanPrice(stock['Current Price']) : cleanPrice(stock['Day-' + i]);
              if (price > 0) { gainSum += qty * (price - purchasePrice); has = true; }
            }
          });
          if (has) {
            days.push(i === 0 ? 'Today' : i + 'd ago');
            values.push(gainSum);
          }
        }
        
        // Smooth out anomalous drops (multi-day drops >40% that recover are likely API errors)
        for (let i = 1; i < values.length; i++) {
          const prevValue = values[i - 1];
          const currValue = values[i];
          const dropFromPrev = ((prevValue - currValue) / prevValue) * 100;
          
          if (dropFromPrev > 40) {
            let recoveryIdx = -1;
            for (let j = i + 1; j < values.length; j++) {
              const futureValue = values[j];
              const diffFromPrev = Math.abs((futureValue - prevValue) / prevValue) * 100;
              if (diffFromPrev < 20) {
                recoveryIdx = j;
                break;
              }
            }
            
            if (recoveryIdx > 0) {
              const recoveryValue = values[recoveryIdx];
              const span = recoveryIdx - i + 1;
              for (let k = i; k < recoveryIdx; k++) {
                const progress = (k - i + 1) / (span + 1);
                values[k] = prevValue + (recoveryValue - prevValue) * progress;
              }
              i = recoveryIdx;
            } else {
              values[i] = prevValue;
            }
          }
        }
        
        const gains = values.map((v, i) => i === 0 ? 0 : v - values[i - 1]);
        const colors = gains.map((g, i) => {
          const recent = i >= values.length - 7;
          return g >= 0 ? (recent ? 'rgba(34,197,94,0.8)' : 'rgba(34,197,94,0.5)') : (recent ? 'rgba(239,68,68,0.8)' : 'rgba(239,68,68,0.5)');
        });
        
        charts.dailyPerf = new Chart(dpCanvas, {
          type: 'bar',
          data: {
            labels: days,
            datasets: [{
              data: gains,
              backgroundColor: colors,
              borderColor: gains.map(g => g >= 0 ? 'rgb(34,197,94)' : 'rgb(239,68,68)'),
              borderWidth: 1
            }]
          },
          options: {
            responsive: true,
            maintainAspectRatio: true,
            aspectRatio: 3,
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  title: c => days[c[0].dataIndex],
                  label: c => ['Value: $' + fmt(values[c.dataIndex], 2), 'Change: ' + (gains[c.dataIndex] >= 0 ? '+' : '') + '$' + fmt(gains[c.dataIndex], 2)]
                }
              }
            },
            scales: {
              y: { beginAtZero: true, ticks: { callback: v => '$' + fmt(v) } },
              x: { ticks: { maxRotation: 45, minRotation: 45, font: { size: 9 } } }
            }
          }
        });
      }

      const gCanvas = document.getElementById('topGainersChart');
      if (gCanvas) {
        const withGain = portfolioData.map(s => {
          const qty = parseFloat(s.Quantity) || 0;
          const curr = cleanPrice(s['Current Price']);
          const yes = cleanPrice(s['Day-1']);
          if (yes === 0) return null;
          return { stock: s, gain: qty * (curr - yes), gainPct: ((curr - yes) / yes) * 100 };
        }).filter(i => i && i.gain > 0);
        const top = withGain.sort((a, b) => b.gain - a.gain).slice(0, 5);
        if (top.length > 0) {
          charts.gainers = new Chart(gCanvas, {
            type: 'bar',
            data: {
              labels: top.map(i => i.stock['Firm name'] || i.stock['Ticker/Symbol']),
              datasets: [{ data: top.map(i => i.gain), backgroundColor: 'rgba(34,197,94,0.7)', borderColor: 'rgb(34,197,94)', borderWidth: 1 }]
            },
            options: { 
              responsive: true, 
              maintainAspectRatio: true, 
              aspectRatio: 2, 
              plugins: { 
                legend: { display: false },
                tooltip: {
                  callbacks: {
                    label: (c) => [
                      'Gain: $' + fmt(c.parsed.y, 2),
                      'Change: +' + top[c.dataIndex].gainPct.toFixed(1) + '%'
                    ]
                  }
                }
              }, 
              scales: { y: { beginAtZero: true, ticks: { callback: v => '$' + fmt(v) } } } 
            }
          });
        }
      }

      const lCanvas = document.getElementById('topLosersChart');
      if (lCanvas) {
        const withLoss = portfolioData.map(s => {
          const qty = parseFloat(s.Quantity) || 0;
          const curr = cleanPrice(s['Current Price']);
          const yes = cleanPrice(s['Day-1']);
          if (yes === 0) return null;
          return { stock: s, gain: qty * (curr - yes), gainPct: ((curr - yes) / yes) * 100 };
        }).filter(i => i && i.gain < 0);
        const top = withLoss.sort((a, b) => a.gain - b.gain).slice(0, 5);
        if (top.length > 0) {
          charts.losers = new Chart(lCanvas, {
            type: 'bar',
            data: {
              labels: top.map(i => i.stock['Firm name'] || i.stock['Ticker/Symbol']),
              datasets: [{ data: top.map(i => Math.abs(i.gain)), backgroundColor: 'rgba(239,68,68,0.7)', borderColor: 'rgb(239,68,68)', borderWidth: 1 }]
            },
            options: { 
              responsive: true, 
              maintainAspectRatio: true, 
              aspectRatio: 2, 
              plugins: { 
                legend: { display: false },
                tooltip: {
                  callbacks: {
                    label: (c) => [
                      'Loss: $' + fmt(c.parsed.y, 2),
                      'Change: ' + top[c.dataIndex].gainPct.toFixed(1) + '%'
                    ]
                  }
                }
              }, 
              scales: { y: { beginAtZero: true, ticks: { callback: v => '$' + fmt(v) } } } 
            }
          });
        }
      }
    }

    function render() {
      if (portfolioData.length === 0) {
        document.getElementById('content').innerHTML = '<p class="text-gray-600">No data found</p>';
        return;
      }

      document.getElementById('priceSourceSelect').value = priceSource;
      document.getElementById('updatePricesBtn').style.display = priceSource === 'yahoo' ? 'block' : 'none';
      
      Object.values(charts).forEach(c => c.destroy());
      Object.values(stockCharts).forEach(c => c.destroy());
      charts = {};
      stockCharts = {};

      let totalValue = 0, totalCost = 0, totalFIF = 0, totalValYes = 0, totalValWeek = 0, totalDividends = 0;
      portfolioData.forEach(s => {
        totalValue += getStockValue(s);
        totalCost += getStockCost(s);
        totalValYes += (parseFloat(s.Quantity) || 0) * cleanPrice(s['Day-1']);
        totalValWeek += (parseFloat(s.Quantity) || 0) * cleanPrice(s['Day-7']);
        totalDividends += cleanPrice(s['Dividend']);
        
        const fifEligible = (s['FIF Eligible'] || '').toLowerCase().trim();
        if (fifEligible === 'yes' || fifEligible === 'y' || fifEligible === 'true' || fifEligible === '1') {
          totalFIF += getStockCost(s);
        }
      });
      const gain = totalValue - totalCost;
      const gainPct = totalCost > 0 ? (gain / totalCost) * 100 : 0;
      const fifRem = 50000 - totalFIF;
      let dayChg = totalValue - totalValYes;
      const weekChg = totalValue - totalValWeek;

      // Validate day change - if it's suspiciously large (>40% of portfolio), check Day-2
      const dayChgPct = totalValue > 0 ? Math.abs(dayChg / totalValue) * 100 : 0;
      if (dayChgPct > 40) {
        // Day-1 data is likely bad, use Day-2 as reference
        let totalValDay2 = 0;
        portfolioData.forEach(s => {
          totalValDay2 += (parseFloat(s.Quantity) || 0) * cleanPrice(s['Day-2']);
        });
        // If Day-2 is closer to current value, use it instead
        const day2ChgPct = totalValue > 0 ? Math.abs((totalValue - totalValDay2) / totalValue) * 100 : 0;
        if (day2ChgPct < dayChgPct && day2ChgPct < 40) {
          dayChg = totalValue - totalValDay2;
        } else {
          // Both Day-1 and Day-2 seem bad, try Day-3
          let totalValDay3 = 0;
          portfolioData.forEach(s => {
            totalValDay3 += (parseFloat(s.Quantity) || 0) * cleanPrice(s['Day-3']);
          });
          const day3ChgPct = totalValue > 0 ? Math.abs((totalValue - totalValDay3) / totalValue) * 100 : 0;
          if (day3ChgPct < dayChgPct && day3ChgPct < 40) {
            dayChg = totalValue - totalValDay3;
          } else {
            // All recent days seem bad, estimate from week change
            dayChg = weekChg / 7; // Rough daily average from week
          }
        }
      }

      // Calculate portfolio metrics
      const portfolioWithMetrics = portfolioData.map(s => {
        const prices = getStockPrices(s, 70);
        const vol = calculateVolatility(prices);
        const curr = cleanPrice(s['Current Price']);
        const maxPrice = Math.max(...prices.filter(p => p > 0));
        const drawdown = maxPrice > 0 ? ((curr - maxPrice) / maxPrice) * 100 : 0;
        return { stock: s, volatility: vol, drawdown: drawdown, value: getStockValue(s) };
      });

      // Portfolio volatility (weighted average)
      let portfolioVol = 0;
      portfolioWithMetrics.forEach(item => {
        const weight = item.value / totalValue;
        portfolioVol += item.volatility * weight;
      });

      // Concentration risk - top 5 holdings
      const sortedByValue = [...portfolioWithMetrics].sort((a, b) => b.value - a.value);
      const top5Value = sortedByValue.slice(0, 5).reduce((sum, item) => sum + item.value, 0);
      const top5Pct = (top5Value / totalValue) * 100;

      // Portfolio returns — symmetric: only include stocks that have data for the relevant period
      // (excludes newly purchased stocks from distorting historical return calculations)
      let pv70old = 0, pv70curr = 0, pv7old = 0, pv7curr = 0, pv1old = 0, pv1curr = 0;
      portfolioData.forEach(s => {
        const qty = parseFloat(s.Quantity) || 0;
        const curr = cleanPrice(s['Current Price']);
        const p70 = cleanPrice(s['Day-70']);
        const p7  = cleanPrice(s['Day-7']);
        const p1  = cleanPrice(s['Day-1']);
        if (p70 > 0 && curr > 0) { pv70old += qty * p70; pv70curr += qty * curr; }
        if (p7  > 0 && curr > 0) { pv7old  += qty * p7;  pv7curr  += qty * curr; }
        if (p1  > 0 && curr > 0) { pv1old  += qty * p1;  pv1curr  += qty * curr; }
      });
      const portfolioReturn70d = calculateReturn(pv70old, pv70curr);
      const portfolioReturn7d  = calculateReturn(pv7old,  pv7curr);
      const portfolioReturn1d  = calculateReturn(pv1old,  pv1curr);

      // Benchmark returns — pre-computed % values read from Benchmarks sheet
      const benchmarkReturns = {};
      ['NZX50', 'ASX200', 'SP500'].forEach(name => {
        const b = benchmarkData[name];
        if (b && (b['1d'] !== null || b['7d'] !== null || b['70d'] !== null)) {
          benchmarkReturns[name] = { '1d': b['1d'], '7d': b['7d'], '70d': b['70d'] };
        }
      });

      let html = '';
      
      html += '<div style="display: flex; gap: 0.5rem; border-bottom: 1px solid var(--border-color); margin-bottom: 1.5rem;">';
      html += '<button onclick="setActiveView(\'dashboard\')" class="btn-primary ' + (activeView === 'dashboard' ? 'active' : '') + '" style="padding: 0.75rem 1rem; border-bottom: 2px solid ' + (activeView === 'dashboard' ? 'var(--green)' : 'transparent') + ';">Dashboard</button>';
      html += '<button onclick="setActiveView(\'table\')" class="btn-primary ' + (activeView === 'table' ? 'active' : '') + '" style="padding: 0.75rem 1rem; border-bottom: 2px solid ' + (activeView === 'table' ? 'var(--green)' : 'transparent') + ';">Table</button>';
      html += '<button onclick="setActiveView(\'bigplan\')" class="btn-primary ' + (activeView === 'bigplan' ? 'active' : '') + '" style="padding: 0.75rem 1rem; border-bottom: 2px solid ' + (activeView === 'bigplan' ? 'var(--green)' : 'transparent') + ';">Big Plan</button>';
      html += '</div>';

      if (activeView === 'table') {
        renderTableView(html, totalValue, totalCost, gain, gainPct, dayChg, weekChg, fifRem);
        return;
      }

      if (activeView === 'bigplan') {
        renderBigPlanView(html, portfolioWithMetrics, totalValue, totalCost, gain, gainPct, top5Pct, sortedByValue, portfolioVol, totalFIF, fifRem, benchmarkReturns, portfolioReturn7d, portfolioReturn70d);
        return;
      }

      const cached = getCachedData();
      if (cached) {
        const min = Math.floor((Date.now() - cached.timestamp) / 60000);
        const hr = Math.floor(min / 60);
        let age = min < 1 ? 'just now' : (hr > 0 ? hr + ' hour' + (hr > 1 ? 's' : '') + ' ago' : min + ' minute' + (min > 1 ? 's' : '') + ' ago');
        document.getElementById('lastUpdatedText').textContent = 'Last updated ' + age;
      }
      
      html += '<div class="card" style="margin-bottom: 1.5rem;"><h2 style="font-size: 1.25rem; font-weight: 600; margin-bottom: 1rem;">Portfolio Summary</h2><div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 0.75rem;">';
      html += '<div class="stat-card"><p class="label">Total Value</p><p class="metric-lg" style="margin-top: 0.25rem;">$' + fmt(totalValue) + '</p></div>';
      html += '<div class="stat-card"><p class="label">Total Gain</p><p class="metric-md ' + (gain >= 0 ? 'gain' : 'loss') + '" style="margin-top: 0.25rem;">' + (gain >= 0 ? '+' : '') + '$' + fmt(Math.abs(gain)) + '</p><p style="font-size: 0.875rem; margin-top: 0.25rem;" class="' + (gainPct >= 0 ? 'gain' : 'loss') + '">' + (gainPct >= 0 ? '+' : '') + fmt(gainPct, 2) + '%</p></div>';
      html += '<div class="stat-card"><p class="label">Day Change</p><p class="metric-md ' + (dayChg >= 0 ? 'gain' : 'loss') + '" style="margin-top: 0.25rem;">' + (dayChg >= 0 ? '+' : '') + '$' + fmt(Math.abs(dayChg)) + '</p></div>';
      html += '<div class="stat-card"><p class="label">Week Change</p><p class="metric-md ' + (weekChg >= 0 ? 'gain' : 'loss') + '" style="margin-top: 0.25rem;">' + (weekChg >= 0 ? '+' : '') + '$' + fmt(Math.abs(weekChg)) + '</p></div>';
      html += '<div class="stat-card"><p class="label">FIF Remaining</p><p class="metric-md" style="margin-top: 0.25rem; color: ' + (fifRem > 10000 ? 'var(--green)' : fifRem > 0 ? '#eab308' : 'var(--red)') + '">$' + fmt(fifRem) + '</p></div>';
      html += '</div></div>';

      html += '<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 0.75rem; margin-bottom: 1.5rem;">';
      html += '<div class="stat-card"><p class="label">Holdings</p><p class="metric-md" style="margin-top: 0.25rem;">' + portfolioData.length + '</p></div>';
      html += '<div class="stat-card"><p class="label">Winning</p><p class="metric-md gain" style="margin-top: 0.25rem;">' + portfolioData.filter(s => getStockGain(s) > 0).length + '</p></div>';
      html += '<div class="stat-card"><p class="label">Losing</p><p class="metric-md loss" style="margin-top: 0.25rem;">' + portfolioData.filter(s => getStockGain(s) < 0).length + '</p></div>';
      html += '<div class="stat-card"><p class="label">Win Rate</p><p class="metric-md" style="margin-top: 0.25rem; color: var(--text-primary);">' + ((portfolioData.filter(s => getStockGain(s) > 0).length / portfolioData.length) * 100).toFixed(1) + '%</p></div>';
      html += '</div>';

      // Calculate realized gains from sold holdings
      let realizedGain = 0;
      let realizedCost = 0;
      let soldCount = 0;
      let soldDividends = 0;
      if (soldHoldingsData && soldHoldingsData.length > 0) {
        soldHoldingsData.forEach(s => {
          const profitLoss = cleanPrice(getField(s, 'Profit/Loss', 'Profit / Loss', 'P/L', 'Net Gain', 'Net Profit', 'Gain/Loss', 'Profit', 'Total Profit'));
          const cost = cleanPrice(getField(s, 'Total Cost', 'Total Purchase Price', 'Cost', 'Purchase Cost', 'Cost Base'));
          const dividend = cleanPrice(getField(s, 'Dividend', 'Dividends', 'Div'));
          realizedGain += profitLoss;
          realizedCost += cost;
          soldDividends += dividend;
          soldCount++;
        });
      }
      const realizedGainPct = realizedCost > 0 ? (realizedGain / realizedCost) * 100 : 0;
      const totalWealth = gain + realizedGain + totalDividends + soldDividends;
      const totalCostAllTime = totalCost + realizedCost;
      const totalWealthPct = totalCostAllTime > 0 ? (totalWealth / totalCostAllTime) * 100 : 0;

      // All-Time Performance section (only show if we have sold holdings)
      if (soldCount > 0) {
        html += '<div class="card" style="background: linear-gradient(135deg, rgba(34, 197, 94, 0.15), rgba(16, 185, 129, 0.1)); border-color: var(--green); margin-bottom: 1.5rem;">';
        html += '<h3 style="font-size: 1.125rem; font-weight: 600; margin-bottom: 0.75rem; display: flex; align-items: center;"><span style="margin-right: 0.5rem;">💎</span> All-Time Performance</h3>';
        html += '<div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 0.75rem;">';
        html += '<div class="stat-card" style="background: rgba(255, 255, 255, 0.05);"><p class="label" style="color: var(--text-secondary);">Current Holdings</p><p class="metric-md ' + (gain >= 0 ? 'gain' : 'loss') + '" style="margin-top: 0.25rem;">' + (gain >= 0 ? '+' : '') + '$' + fmt(Math.abs(gain)) + '</p><p style="font-size: 0.75rem; margin-top: 0.25rem; color: var(--text-secondary);">' + (gainPct >= 0 ? '+' : '') + gainPct.toFixed(1) + '%</p></div>';

      const dividend = cleanPrice(stock['Dividend']);
      const totalReturn = capitalGain + dividend;
      const totalReturnPct = cost > 0 ? (totalReturn / cost) * 100 : 0;

      // Daily move
      const dayChg = yesterday > 0 ? curr - yesterday : 0;
      const dayChgPct = yesterday > 0 ? ((curr - yesterday) / yesterday) * 100 : 0;
      const dayChgDollar = qty * dayChg;

      // 7-day move
      const sevenDayPct = day7price > 0 ? ((curr - day7price) / day7price) * 100 : null;
      const sevenDayDollar = day7price > 0 ? qty * (curr - day7price) : null;

      // 52-week range
      let min52 = curr, max52 = curr;
      for (let i = 1; i <= 70; i++) {
        const p = cleanPrice(stock['Day-' + i]);
        if (p > 0) { if (p < min52) min52 = p; if (p > max52) max52 = p; }
      }
      const range52 = max52 - min52;
      const pos52 = range52 > 0 ? ((curr - min52) / range52) * 100 : 50;

      const etf = isETF(stock);
      const isPositive = totalReturn >= 0;

      let h = '<div class="card-compact" style="border-color: ' + (isPositive ? 'var(--green)' : 'var(--red)') + '; border-width: 2px;">';

      // ── Header: name + ticker stacked left · price right ──
      h += '<div style="display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.625rem;">';
      h += '<div style="min-width: 0; flex: 1; margin-right: 0.75rem;">';
      h += '<div style="display: flex; align-items: center; gap: 0.35rem; margin-bottom: 0.2rem;">';
      h += '<h3 style="font-weight: 700; font-size: 0.975rem; margin: 0; line-height: 1.2;">' + (stock['Firm name'] || 'Unknown') + '</h3>';
      if (etf) h += '<span style="font-size: 0.58rem; font-weight: 700; background: #dbeafe; color: #1d4ed8; border-radius: 4px; padding: 1px 5px; letter-spacing: 0.05em; flex-shrink: 0;">ETF</span>';
      h += '</div>';
      h += '<p style="font-size: 0.72rem; color: var(--text-muted); margin: 0; font-weight: 500; text-align: left;">' + ticker + '</p>';
      h += '</div>';
      h += '<div style="text-align: right; flex-shrink: 0;">';
      h += '<p style="font-size: 1.2rem; font-weight: 700; line-height: 1; color: var(--text-primary);">$' + fmt(curr, 2) + '</p>';
      h += '<p style="font-size: 0.68rem; color: var(--text-muted); margin-top: 0.15rem;">per share</p>';
      h += '</div></div>';

      // ── Total Return hero box ──
      const retBg = isPositive ? 'var(--green-bg)' : 'var(--red-bg)';
      const retBorder = isPositive ? 'var(--green)' : 'var(--red)';
      const retDark = isPositive ? 'var(--green-dark)' : 'var(--red-dark)';
      h += '<div style="padding: 0.625rem 0.75rem; border-radius: 8px; margin-bottom: 0.625rem; background: ' + retBg + '; border: 1px solid ' + retBorder + ';">';
      h += '<div style="display: flex; justify-content: space-between; align-items: center;">';
      h += '<div>';
      h += '<p style="font-size: 0.6rem; font-weight: 700; letter-spacing: 0.06em; color: ' + retDark + '; text-transform: uppercase; margin-bottom: 0.2rem;">Total Return</p>';
      h += '<p class="' + (isPositive ? 'gain' : 'loss') + '" style="font-weight: 800; font-size: 1.6rem; line-height: 1; letter-spacing: -0.03em;">' + (isPositive ? '+' : '') + '$' + fmt(totalReturn) + '</p>';
      if (dividend > 0) {
        h += '<p style="font-size: 0.67rem; color: var(--text-secondary); margin-top: 0.25rem;">Capital ' + (capitalGain >= 0 ? '+' : '') + '$' + fmt(capitalGain) + '&nbsp; +&nbsp; Div $' + fmt(dividend) + '</p>';
      } else {
        h += '<p style="font-size: 0.67rem; color: var(--text-secondary); margin-top: 0.25rem;">vs cost $' + fmt(cost) + '</p>';
      }
      h += '</div>';
      h += '<div style="text-align: right;">';
      h += '<p class="' + (isPositive ? 'gain' : 'loss') + '" style="font-weight: 800; font-size: 1.35rem; line-height: 1;">' + (totalReturnPct >= 0 ? '+' : '') + totalReturnPct.toFixed(1) + '%</p>';
      h += '<p style="font-size: 0.67rem; color: var(--text-secondary); margin-top: 0.25rem;">Value $' + fmt(val) + '</p>';
      h += '</div>';
      h += '</div></div>';

      // ── Today · 7-Day performance row ──
      h += '<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-bottom: 0.625rem;">';

      // Today
      if (yesterday > 0) {
        const todayBg = dayChgPct >= 0 ? 'var(--green-bg)' : 'var(--red-bg)';
        const todayBorder = dayChgPct >= 0 ? 'var(--green)' : 'var(--red)';
        h += '<div style="padding: 0.5rem 0.625rem; border-radius: 7px; background: ' + todayBg + '; border: 1px solid ' + todayBorder + ';">';
        h += '<p style="font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary); margin-bottom: 0.2rem;">Today</p>';
        h += '<p class="' + (dayChgPct >= 0 ? 'gain' : 'loss') + '" style="font-weight: 800; font-size: 1.5rem; line-height: 1; letter-spacing: -0.02em;">' + (dayChgPct >= 0 ? '+' : '') + dayChgPct.toFixed(2) + '%</p>';
        h += '<p class="' + (dayChgDollar >= 0 ? 'gain' : 'loss') + '" style="font-size: 0.75rem; font-weight: 600; margin-top: 0.2rem;">' + (dayChgDollar >= 0 ? '+' : '') + '$' + fmt(dayChgDollar) + '</p>';
        h += '</div>';
      } else {
        h += '<div style="padding: 0.5rem 0.625rem; border-radius: 7px; background: var(--bg-tertiary);">';
        h += '<p style="font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 0.2rem;">Today</p>';
        h += '<p style="font-size: 0.8rem; color: var(--text-muted);">—</p>';
        h += '</div>';
      }

      // 7-Day
      if (sevenDayPct !== null) {
        const wkBg = sevenDayPct >= 0 ? 'var(--green-bg)' : 'var(--red-bg)';
        const wkBorder = sevenDayPct >= 0 ? 'var(--green)' : 'var(--red)';
        h += '<div style="padding: 0.5rem 0.625rem; border-radius: 7px; background: ' + wkBg + '; border: 1px solid ' + wkBorder + ';">';
        h += '<p style="font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-secondary); margin-bottom: 0.2rem;">7-Day</p>';
        h += '<p class="' + (sevenDayPct >= 0 ? 'gain' : 'loss') + '" style="font-weight: 800; font-size: 1.5rem; line-height: 1; letter-spacing: -0.02em;">' + (sevenDayPct >= 0 ? '+' : '') + sevenDayPct.toFixed(2) + '%</p>';
        h += '<p class="' + (sevenDayDollar >= 0 ? 'gain' : 'loss') + '" style="font-size: 0.75rem; font-weight: 600; margin-top: 0.2rem;">' + (sevenDayDollar >= 0 ? '+' : '') + '$' + fmt(sevenDayDollar) + '</p>';
        h += '</div>';
      } else {
        h += '<div style="padding: 0.5rem 0.625rem; border-radius: 7px; background: var(--bg-tertiary);">';
        h += '<p style="font-size: 0.6rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin-bottom: 0.2rem;">7-Day</p>';
        h += '<p style="font-size: 0.8rem; color: var(--text-muted);">—</p>';
        h += '</div>';
      }

      h += '</div>';

      // ── 52-week range bar ──
      const bubbleColor = pos52 > 70 ? 'var(--green)' : pos52 < 30 ? 'var(--red)' : '#f59e0b';
      h += '<div style="margin-bottom: 0.625rem;">';
      h += '<div style="display: flex; justify-content: space-between; font-size: 0.67rem; color: var(--text-secondary); margin-bottom: 0.2rem; font-weight: 500;">';
      h += '<span>52W Lo $' + fmt(min52, 2) + '</span>';
      h += '<span style="color: var(--text-muted);">' + pos52.toFixed(0) + '% of range</span>';
      h += '<span>Hi $' + fmt(max52, 2) + '</span>';
      h += '</div>';
      h += '<div style="position: relative; height: 16px; background: var(--bg-tertiary); border-radius: 8px;">';
      h += '<div style="position: absolute; top: 50%; left: ' + Math.min(Math.max(pos52, 2), 98) + '%; transform: translate(-50%, -50%); width: 12px; height: 12px; background: ' + bubbleColor + '; border-radius: 50%; border: 2px solid var(--bg-secondary); box-shadow: 0 1px 3px rgba(0,0,0,.2);"></div>';
      h += '</div></div>';

      // ── Mini charts ──
      h += '<div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.5rem; margin-bottom: 0.5rem;">';
      h += '<div><p style="font-size: 0.62rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 0.2rem;">7-Day chart</p>';
      h += '<div style="height:59px; width:100%; position:relative; overflow:hidden;"><canvas id="chart7d-' + ticker + '" style="display:block; box-sizing:border-box; height:59px; width:100%;"></canvas></div></div>';
      h += '<div><p style="font-size: 0.62rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 0.2rem;">70-Day chart</p>';
      h += '<div style="height:59px; width:100%; position:relative; overflow:hidden;"><canvas id="chart70d-' + ticker + '" style="display:block; box-sizing:border-box; height:59px; width:100%;"></canvas></div></div>';
      h += '</div>';

      // ── Details strip (no dividend — already in return box) ──
      h += '<div style="padding: 0.3rem 0.5rem; background: var(--bg-tertiary); border-radius: 5px; font-size: 0.68rem; color: var(--text-muted);">';
      h += qty + ' shares&nbsp; ·&nbsp; Buy $' + fmt(purchasePrice, 2) + '&nbsp; ·&nbsp; Cost $' + fmt(cost);
      h += '</div>';

      h += '</div>';
      return h;
    }

    if (SHEET_ID && API_KEY) {
      setTimeout(() => {
        document.getElementById('priceSourceSelect').value = priceSource;
        document.getElementById('updatePricesBtn').style.display = priceSource === 'yahoo' ? 'block' : 'none';
      }, 100);
      loadData(false);
    }
    
    window.setSortBy = setSortBy;
    window.setGainLossPeriod = setGainLossPeriod;
    window.setFifFilter = setFifFilter;
    window.setLocationFilter = setLocationFilter;
    window.setActiveView = setActiveView;
    window.setTableMetric = setTableMetric;
    window.setTableSortBy = setTableSortBy;
    window.loadData = loadData;
    window.clearCache = clearCache;
    window.dismissAlert = dismissAlert;
  </script>
</body>
</html>
